<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="贵重物品持有成本、二手价格、购买参考与生活平替工具">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#f4f5f3">
  <title>Value Lab</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <script>
    (() => {
      try {
        const saved = localStorage.getItem('vl.theme');
        const theme = saved || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.dataset.theme = theme;
      } catch (_) {}
    })();
  </script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="app-header">
  <a class="brand" href="#cost" aria-label="Value Lab 首页">
    <strong>Value Lab</strong><span id="headerMeta">持有成本</span>
  </a>
  <nav id="mainTabs" class="main-tabs" aria-label="主要功能">
    <button class="main-tab active" data-view="cost" type="button"><span>￥</span>成本</button>
    <button class="main-tab" data-view="market" type="button"><span>↕</span>市场</button>
    <button class="main-tab" data-view="buy" type="button"><span>▤</span>购买参考</button>
    <button class="main-tab" data-view="alternatives" type="button"><span>≈</span>生活平替</button>
    <button class="main-tab" data-view="my" type="button"><span>☆</span>我的</button>
  </nav>
  <div class="header-actions">
    <button id="globalSearchButton" class="icon-button" type="button" title="全局搜索" aria-label="全局搜索">⌕</button>
    <button id="infoButton" class="icon-button" type="button" title="数据说明" aria-label="数据说明">i</button>
    <button id="themeToggle" class="icon-button" type="button" title="切换主题" aria-label="切换主题">◐</button>
    <div class="menu-wrap">
      <button id="exportButton" class="icon-button" type="button" title="导出" aria-label="导出数据" aria-haspopup="menu" aria-expanded="false">⇩</button>
      <div id="exportMenu" class="menu" role="menu" hidden>
        <button data-export="json" role="menuitem">完整数据 · JSON</button>
        <button data-export="market" role="menuitem">市场价格 · CSV</button>
        <button data-export="alternatives" role="menuitem">生活平替 · CSV</button>
      </div>
    </div>
  </div>
</header>

<div class="statusbar"><span id="dataStatus">读取数据…</span><span id="dataDate"></span></div>

<main id="appMain">
  <section id="view-cost" class="view active">
    <div class="page-head"><div><h1>持有成本</h1><p>买入、使用、维护和出售合并计算。</p></div><button id="resetCost" class="text-button" type="button">恢复默认</button></div>
    <div class="product-tabs" data-product-tabs="cost">
      <button class="active" data-product="iphone" type="button">iPhone</button>
      <button data-product="ipad" type="button">iPad</button>
      <button data-product="macbook-air" type="button">MacBook Air</button>
      <button data-product="macbook" type="button">MacBook Pro</button>
    </div>
    <div id="costControls" class="toolbar"></div>
    <div id="costKpis" class="kpi-strip"></div>
    <section class="block trend-block">
      <div class="block-head"><div><h2>1–5 年价值趋势</h2><span id="trendMeta"></span></div><div class="segmented"><button class="active" data-trend-mode="age" type="button">产品机龄</button><button data-trend-mode="holding" type="button">我的持有</button></div></div>
      <div class="trend-layout"><div id="trendChart" class="trend-chart"></div><div id="trendSummary" class="trend-summary"></div></div>
      <div id="trendTable" class="table-wrap"></div>
    </section>
    <div class="split cost-bottom">
      <section class="block"><div class="block-head"><h2>交易路径</h2><span>同配置比较</span></div><div id="routeTable" class="table-wrap"></div></section>
      <aside class="block"><div class="block-head"><h2>换机结论</h2><span id="selectedRelease"></span></div><div id="costConclusion"></div></aside>
    </div>
  </section>

  <section id="view-market" class="view" hidden>
    <div class="page-head"><div><h1>市场价格</h1><p>新品、二手买入、个人转卖和平台回收分开查看。</p></div></div>
    <div class="product-tabs" data-product-tabs="market"><button class="active" data-product="iphone" type="button">iPhone</button><button data-product="ipad" type="button">iPad</button><button data-product="macbook-air" type="button">MacBook Air</button><button data-product="macbook" type="button">MacBook Pro</button></div>
    <div class="toolbar market-toolbar">
      <label>搜索<input id="marketSearch" type="search" placeholder="机型、配置、平台、机况"></label>
      <label>类型<select id="marketSide"><option value="">全部</option><option value="buy">买入</option><option value="sell">卖出</option></select></label>
      <label>数据<select id="marketConfidence"><option value="">全部</option><option value="high">核验</option><option value="medium">样本</option><option value="low">参考</option></select></label>
      <label>平台<select id="marketChannel"><option value="">全部</option></select></label>
    </div>
    <div id="marketKpis" class="kpi-strip compact"></div>
    <section class="block"><div class="block-head"><h2>价格记录</h2><span id="marketCount"></span></div><div id="marketTable" class="table-wrap tall"></div></section>
  </section>

  <section id="view-buy" class="view" hidden>
    <div class="page-head"><div><h1>购买参考</h1><p>参数、价格和购买判断放在一起。</p></div></div>
    <div class="product-tabs" data-product-tabs="buy"><button class="active" data-product="iphone" type="button">iPhone</button><button data-product="ipad" type="button">iPad</button><button data-product="macbook-air" type="button">MacBook Air</button><button data-product="macbook" type="button">MacBook Pro</button></div>
    <div class="toolbar buy-toolbar">
      <label>搜索<input id="buySearch" type="search" placeholder="芯片、内存、120Hz、长焦"></label>
      <label id="buyYearLabel">年份<select id="buyYear"><option value="">全部</option></select></label>
      <label id="buyTierLabel">系列<select id="buyTier"><option value="">全部</option></select></label>
      <label>预算上限<input id="buyBudget" type="number" min="0" step="500" placeholder="不限"></label>
      <label class="check"><input id="buyUsed" type="checkbox" checked>接受二手</label>
    </div>
    <div class="split buy-layout">
      <section class="block"><div class="block-head"><h2>产品列表</h2><span id="buyCount"></span></div><div id="buyTable" class="table-wrap tall"></div></section>
      <aside class="block sticky-detail"><div class="block-head"><h2>详细信息</h2><span>选择一行查看</span></div><div id="buyDetail"></div></aside>
    </div>
  </section>

  <section id="view-alternatives" class="view" hidden>
    <div class="page-head"><div><h1>生活平替</h1><p>先看功能、限制和风险，再看能省多少。</p></div><button id="showFavorites" class="text-button" type="button">只看收藏</button></div>
    <div class="alternative-search"><span>⌕</span><input id="alternativeSearch" type="search" placeholder="搜索需求、平替方案、材料或使用场景"></div>
    <div id="categoryChips" class="category-chips"></div>
    <div class="toolbar alternative-toolbar">
      <label>可靠性<select id="alternativeReliability"><option value="">全部</option><option value="A">A · 高</option><option value="B">B · 有限制</option><option value="C">C · 临时</option></select></label>
      <label>风险<select id="alternativeRisk"><option value="">全部</option><option value="low">低风险</option><option value="conditional">有条件</option></select></label>
      <label>证据<select id="alternativeEvidence"><option value="">全部</option><option value="A">A</option><option value="B">B</option><option value="C">C</option></select></label>
      <label>类型<select id="alternativeType"><option value="">全部</option></select></label>
      <label>排序<select id="alternativeSort"><option value="recommended">综合推荐</option><option value="saving">预计节省</option><option value="reliability">可靠性</option><option value="category">分类</option></select></label>
    </div>
    <div class="split alternative-layout">
      <section class="block"><div class="block-head"><h2>平替列表</h2><span id="alternativeCount"></span></div><div id="alternativeTable" class="table-wrap tall"></div></section>
      <aside class="block sticky-detail"><div class="block-head"><h2>方案详情</h2><span id="alternativeDetailMeta"></span></div><div id="alternativeDetail"></div></aside>
    </div>
  </section>

  <section id="view-my" class="view" hidden>
    <div class="page-head"><div><h1>我的</h1><p>数据只保存在当前浏览器。</p></div><button id="clearMyData" class="text-button danger-text" type="button">清空本地数据</button></div>
    <div id="myKpis" class="kpi-strip"></div>
    <div class="split my-layout">
      <section class="block"><div class="block-head"><h2>我的物品</h2><button id="addOwnedItem" class="small-button" type="button">＋ 添加</button></div><div id="ownedItems"></div></section>
      <section class="block"><div class="block-head"><h2>平替收藏</h2><span id="favoriteCount"></span></div><div id="favoriteAlternatives"></div></section>
    </div>
  </section>
</main>

<nav class="mobile-nav" aria-label="移动端导航">
  <button class="active" data-view="cost" type="button">￥<span>成本</span></button>
  <button data-view="market" type="button">↕<span>市场</span></button>
  <button data-view="buy" type="button">▤<span>选购</span></button>
  <button data-view="alternatives" type="button">≈<span>平替</span></button>
  <button data-view="my" type="button">☆<span>我的</span></button>
</nav>

<dialog id="detailDialog" class="detail-dialog"><div class="dialog-head"><strong id="detailDialogTitle">详情</strong><button class="icon-button" data-close-dialog="detailDialog" type="button">×</button></div><div id="detailDialogBody"></div></dialog>
<dialog id="infoDialog" class="info-dialog"><div class="dialog-head"><strong>数据说明</strong><button class="icon-button" data-close-dialog="infoDialog" type="button">×</button></div><div id="infoBody"></div></dialog>
<dialog id="searchDialog" class="search-dialog"><div class="dialog-head"><strong>全局搜索</strong><button class="icon-button" data-close-dialog="searchDialog" type="button">×</button></div><div class="global-search"><input id="globalSearch" type="search" placeholder="搜索产品、品牌、生活需求或平替方案"></div><div id="globalSearchResults"></div></dialog>
<dialog id="ownedDialog" class="owned-dialog"><form method="dialog" id="ownedForm"><div class="dialog-head"><strong>添加我的物品</strong><button class="icon-button" value="cancel" type="submit">×</button></div><div class="form-grid"><label>产品类型<select id="ownedType"><option value="iphone">iPhone</option><option value="ipad">iPad</option><option value="macbook-air">MacBook Air</option><option value="macbook">MacBook Pro</option></select></label><label>机型<select id="ownedModel"></select></label><label>购买日期<input id="ownedDate" type="date" required></label><label>购买价格<input id="ownedPrice" type="number" min="0" step="100" required></label><label>备注<input id="ownedNote" type="text" maxlength="80" placeholder="成色、容量或配置"></label></div><div class="dialog-actions"><button value="cancel" type="submit" class="text-button">取消</button><button id="saveOwned" value="default" type="button" class="primary-button">保存</button></div></form></dialog>
<div id="toast" class="toast" role="status" aria-live="polite"></div>
<footer><span>价格、价值趋势和平替评价用于比较；交易或使用前请复核具体条件。</span></footer>
<script src="app.js"></script>
</body>
</html>
